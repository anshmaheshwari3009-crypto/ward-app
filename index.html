<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ward Report Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased font-sans pb-10">
    <div class="max-w-md mx-auto p-4 md:py-8">
        
        <!-- Header -->
        <div class="mb-6 bg-blue-600 text-white p-5 rounded-2xl shadow-md">
            <h1 class="text-xl font-bold tracking-tight">Report Dispatcher</h1>
            <p class="text-sm text-blue-100 mt-1">Simulated offline prototype</p>
        </div>

        <!-- Main Form -->
        <form id="uploadForm" class="space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Patient UHID / Case No.</label>
                <input type="text" id="uhid" required placeholder="e.g., UHID-4829" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Patient Name</label>
                <input type="text" id="patientName" placeholder="e.g., Ramesh Kumar" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Senior Doctor Mobile</label>
                <input type="tel" id="doctorContact" required placeholder="+91 XXXXX XXXXX" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>

            <!-- Camera/File Section -->
            <div class="pt-2">
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
                
                <button type="button" id="snapBtn" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center hover:bg-slate-50 transition active:bg-slate-100">
                    <span class="text-3xl mb-1">📸</span>
                    <span class="text-sm font-semibold text-blue-600">Capture Report Image</span>
                    <span class="text-xs text-slate-400 mt-0.5">Launches rear camera</span>
                </button>

                <!-- Preview Thumbnail -->
                <div id="previewContainer" class="hidden mt-3 p-2 bg-slate-50 rounded-xl border border-slate-200 flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <img id="imagePreview" src="" class="w-14 h-14 object-cover rounded-lg border bg-white">
                        <div>
                            <p class="text-xs font-medium text-slate-700">Image staged</p>
                            <p id="fileSizeLabel" class="text-[10px] text-slate-400">Ready</p>
                        </div>
                    </div>
                    <button type="button" id="clearBtn" class="text-xs font-medium text-red-500 px-3 py-1 bg-red-50 rounded-lg hover:bg-red-100">Clear</button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg shadow-slate-200 transition duration-150 flex items-center justify-center space-x-2 active:scale-[0.99]">
                <span>Dispatch to Senior</span>
            </button>
        </form>

        <!-- Status Alerts -->
        <div id="statusAlert" class="hidden mt-4 p-4 rounded-xl text-sm font-medium text-center shadow-sm"></div>

        <!-- Recent Uploads History (Simulating the Server Folders) -->
        <div class="mt-8">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">Recent Dispatches (Local Folder)</h2>
            <div id="historyList" class="space-y-3">
                <p class="text-sm text-slate-400 text-center py-4 bg-white rounded-xl border border-slate-200 border-dashed">No reports sent yet.</p>
            </div>
        </div>

    </div>

    <script>
        const snapBtn = document.getElementById('snapBtn');
        const cameraInput = document.getElementById('cameraInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const fileSizeLabel = document.getElementById('fileSizeLabel');
        const clearBtn = document.getElementById('clearBtn');
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusAlert = document.getElementById('statusAlert');
        const historyList = document.getElementById('historyList');

        let selectedFile = null;
        let fileDataUrl = null; 

        // Load history from browser memory
        let uploads = JSON.parse(localStorage.getItem('hospital_uploads')) || [];
        renderHistory();

        snapBtn.addEventListener('click', () => cameraInput.click());

        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                
                // Convert to Base64 for local storage simulation
                const reader = new FileReader();
                reader.onload = (e) => {
                    fileDataUrl = e.target.result;
                    imagePreview.src = fileDataUrl;
                };
                reader.readAsDataURL(file);

                fileSizeLabel.textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
                previewContainer.classList.remove('hidden');
                snapBtn.classList.add('hidden');
            }
        });

        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileDataUrl = null;
            cameraInput.value = '';
            previewContainer.classList.add('hidden');
            snapBtn.classList.remove('hidden');
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!selectedFile) return alert('Please snap a picture of the report first.');

            // UI loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Processing & Routing...</span>';
            statusAlert.classList.add('hidden');

            // Simulate network delay of 1.5 seconds
            setTimeout(() => {
                const uhid = document.getElementById('uhid').value.trim();
                const patientName = document.getElementById('patientName').value.trim();
                const doctorContact = document.getElementById('doctorContact').value.trim();
                const safeUhid = uhid.replace(/[^a-zA-Z0-9-_]/g, '_');
                
                const newUpload = {
                    id: Date.now(),
                    uhid: safeUhid,
                    name: patientName || 'Unknown',
                    doctor: doctorContact,
                    image: fileDataUrl,
                    time: new Date().toLocaleTimeString()
                };

                uploads.unshift(newUpload);
                localStorage.setItem('hospital_uploads', JSON.stringify(uploads));

                showStatus(`✅ Routed to folder <b>/patients/${safeUhid}/</b><br>Notification sent to ${doctorContact}`, 'bg-green-100 text-green-800 border border-green-200');
                
                form.reset();
                clearBtn.click();
                renderHistory();
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Dispatch to Senior</span>';
            }, 1500);
        });

        function showStatus(msg, classes) {
            statusAlert.className = 'mt-4 p-4 rounded-xl text-sm font-medium text-center shadow-sm ' + classes;
            statusAlert.innerHTML = msg;
            statusAlert.classList.remove('hidden');
        }

        function renderHistory() {
            if (uploads.length === 0) return;
            
            historyList.innerHTML = uploads.map(upload => `
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex space-x-3 items-center">
                    <img src="${upload.image}" class="w-16 h-16 object-cover rounded-lg border border-slate-200">
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-slate-800 truncate text-sm">📁 /${upload.uhid}</h3>
                            <span class="text-[10px] font-semibold text-slate-400 bg-slate-100 px-2 py-1 rounded">${upload.time}</span>
                        </div>
                        <p class="text-xs text-slate-500 mt-0.5 truncate">Patient: ${upload.name}</p>
                        <p class="text-xs text-blue-600 mt-0.5 truncate font-medium">Alerted: ${upload.doctor}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
