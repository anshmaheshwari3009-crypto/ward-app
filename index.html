<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Ward Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased font-sans pb-10">
    <div class="max-w-md mx-auto p-4 md:py-8">
        
        <div class="mb-6 bg-blue-600 text-white p-5 rounded-2xl shadow-md flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">AI Report Scanner</h1>
                <p class="text-sm text-blue-100 mt-1">Zero-typing workflow</p>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="flex bg-slate-200 p-1 rounded-xl mb-6">
            <button id="btnOnboard" class="flex-1 py-2 text-sm font-bold bg-white rounded-lg shadow-sm text-blue-600">1. Onboard Patient</button>
            <button id="btnScan" class="flex-1 py-2 text-sm font-bold text-slate-500 rounded-lg">2. Auto-Scan Reports</button>
        </div>

        <!-- Onboarding Form -->
        <form id="onboardForm" class="space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <p class="text-xs text-slate-500 font-bold uppercase mb-2">Setup New Patient Profile</p>
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Senior Doctor WhatsApp (+91)</label>
                <input type="tel" id="doctorContact" required placeholder="+919876543210" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
            </div>

            <div class="pt-2">
                <input type="file" id="onboardInput" accept="image/*" capture="environment" class="hidden">
                <button type="button" onclick="document.getElementById('onboardInput').click()" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center hover:bg-slate-50">
                    <span class="text-2xl mb-1">📄</span>
                    <span class="text-sm font-semibold text-blue-600">Snap Admission Sheet</span>
                </button>
                <p id="onboardFileStatus" class="text-xs text-center text-green-600 mt-2 font-bold hidden">✓ Sheet Captured</p>
            </div>

            <button type="submit" id="onboardSubmit" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg">Extract Data & Onboard</button>
        </form>

        <!-- Scan Report Form (Hidden by default) -->
        <form id="scanForm" class="hidden space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-green-500">
            <p class="text-xs text-slate-500 font-bold uppercase mb-2 text-center">AI will automatically find UHID and route file</p>
            
            <div class="pt-2">
                <input type="file" id="scanInput" accept="image/*" capture="environment" class="hidden">
                <button type="button" onclick="document.getElementById('scanInput').click()" class="w-full py-10 border-2 border-dashed border-green-300 bg-green-50 rounded-xl flex flex-col items-center justify-center">
                    <span class="text-4xl mb-2">📸</span>
                    <span class="text-lg font-bold text-green-700">Scan Medical Report</span>
                </button>
                <p id="scanFileStatus" class="text-xs text-center text-green-600 mt-2 font-bold hidden">✓ Report Captured</p>
            </div>

            <button type="submit" id="scanSubmit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Process & Send to Senior</button>
        </form>

        <div id="statusAlert" class="hidden mt-4 p-4 rounded-xl text-sm font-medium text-center shadow-sm"></div>

    </div>

    <script>
        // UI Toggles
        const btnOnboard = document.getElementById('btnOnboard');
        const btnScan = document.getElementById('btnScan');
        const onboardForm = document.getElementById('onboardForm');
        const scanForm = document.getElementById('scanForm');
        
        btnOnboard.onclick = () => {
            onboardForm.classList.remove('hidden');
            scanForm.classList.add('hidden');
            btnOnboard.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            btnScan.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            btnScan.classList.add('text-slate-500');
        };

        btnScan.onclick = () => {
            scanForm.classList.remove('hidden');
            onboardForm.classList.add('hidden');
            btnScan.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            btnOnboard.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            btnOnboard.classList.add('text-slate-500');
        };

        // File Status Indicators
        document.getElementById('onboardInput').onchange = () => document.getElementById('onboardFileStatus').classList.remove('hidden');
        document.getElementById('scanInput').onchange = () => document.getElementById('scanFileStatus').classList.remove('hidden');

        // Handlers
        const handleUpload = async (e, endpoint, inputId, btnId, formDataBuilder) => {
            e.preventDefault();
            const fileInput = document.getElementById(inputId);
            if (!fileInput.files[0]) return alert('Please snap a photo first.');

            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'AI is reading document...';
            document.getElementById('statusAlert').classList.add('hidden');

            try {
                const formData = new FormData();
                formData.append(endpoint === '/api/onboard' ? 'document' : 'report', fileInput.files[0]);
                if (formDataBuilder) formDataBuilder(formData);

                const response = await fetch(endpoint, { method: 'POST', body: formData });
                const result = await response.json();

                if (response.ok) {
                    showStatus('✅ ' + result.message, 'bg-green-100 text-green-800');
                    e.target.reset();
                    fileInput.value = '';
                } else {
                    showStatus('❌ ' + result.error, 'bg-red-100 text-red-800');
                }
            } catch (err) {
                showStatus('⚠️ Network error.', 'bg-amber-100');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        };

        onboardForm.onsubmit = (e) => handleUpload(e, '/api/onboard', 'onboardInput', 'onboardSubmit', (fd) => fd.append('doctorContact', document.getElementById('doctorContact').value));
        scanForm.onsubmit = (e) => handleUpload(e, '/api/scan-report', 'scanInput', 'scanSubmit');

        function showStatus(msg, classes) {
            const alert = document.getElementById('statusAlert');
            alert.className = 'mt-4 p-4 rounded-xl text-sm font-medium text-center shadow-sm ' + classes;
            alert.innerHTML = msg;
            alert.classList.remove('hidden');
        }
    </script>
</body>
</html>
